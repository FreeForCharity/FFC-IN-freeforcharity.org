name: Scheduled production smoke

# Run the post-deploy smoke suite against live production once a day.
# Catches regressions introduced by changes we don't control:
#   - Cloudflare config drift (caching, redirect rules, security shield)
#   - cPanel/Apache state (DocRoot moved, .htaccess deleted, /hub/ broken)
#   - Third-party widgets (Zeffy iframe down, PayPal hosted button retired,
#     GTM container deleted, Tawk endpoint flaky)
# Anything the deploy-cpanel post-deploy smoke step would catch immediately
# after a deploy, this catches if it regresses days or weeks later without
# a new deploy to surface it.
#
# Cost: ~30 seconds per run, no build step (smoke script fetches the live
# sitemap when no local one is present). Daily cadence keeps GHA usage
# negligible.

on:
  schedule:
    # 13:00 UTC daily = ~6am Pacific, ~9am Eastern — early enough that an
    # operator can react during business hours if it fails.
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    name: Smoke-test production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Pre-flight: skip the smoke suite while production is still the
      # WordPress site. The suite asserts the post-cutover Next.js + .htaccess
      # behavior (legacy WP URLs should 301 to their Next.js equivalents,
      # /hub/ delegated to WHMCS, etc.), none of which is true while WP is
      # still serving the apex. WordPress fingerprints itself with the
      # `x-powered-by: PHP/...` response header; the static Next.js export
      # from LiteSpeed does not. Once cutover swaps the docroot, the header
      # disappears and this step becomes a no-op.
      - name: Pre-flight — is production still WordPress?
        id: cutover-check
        run: |
          # Probe the apex with retries + timeout so a transient network
          # blip doesn't trigger a false "cutover done" reading. Match
          # `x-powered-by: PHP/*` case-insensitively against the header
          # dump — that's the WordPress fingerprint that disappears once
          # the cPanel docroot swap retires PHP from the response path.
          powered_by=$(
            curl -sIL --max-time 15 --retry 3 --retry-delay 2 \
              https://freeforcharity.org/ 2>/dev/null \
              | tr -d '\r' \
              | grep -i '^x-powered-by:' \
              | tail -n 1 \
              | sed 's/^[Xx]-[Pp]owered-[Bb]y:[[:space:]]*//'
          )
          echo "x-powered-by header: '${powered_by}'"
          shopt -s nocasematch
          # Fail-safe: if the probe returned nothing at all (network/DNS/TLS
          # failure, runner outage, etc.), assume we're still pre-cutover
          # and skip — that's the safer side. The smoke would just open a
          # noisy false-positive incident; the gate stays cautious instead.
          if [[ -z "${powered_by}" ]]; then
            echo "is_wp=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Probe inconclusive::Could not read x-powered-by from https://freeforcharity.org/ (empty or curl failed). Skipping smoke as a precaution — re-run once the apex is reachable."
          elif [[ "${powered_by}" == PHP/* ]]; then
            echo "is_wp=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Pre-cutover state::Production is still WordPress (x-powered-by: ${powered_by}). Skipping smoke until the cPanel docroot swap is done. This is expected; the workflow will start asserting cutover behavior automatically once PHP is no longer in the response path."
          else
            echo "is_wp=false" >> "$GITHUB_OUTPUT"
            echo "Production is no longer WordPress (x-powered-by: ${powered_by}) — proceeding with full smoke suite."
          fi

      - name: Run smoke suite against production
        id: smoke
        if: steps.cutover-check.outputs.is_wp == 'false'
        env:
          BASE_URL: https://freeforcharity.org
        run: node scripts/smoke-test.mjs

      - name: Open issue on failure (scheduled runs only)
        if: failure() && github.event_name == 'schedule' && steps.cutover-check.outputs.is_wp == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            // Reuse an existing open production-health issue if one is still open —
            // avoids spamming the tracker on a multi-day outage.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'production-health',
              state: 'open',
            })
            const date = new Date().toISOString().slice(0, 10)
            if (existing.data.length > 0) {
              const issue = existing.data[0]
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Smoke also failed on ${date}: ${runUrl}`,
              })
              console.log(`Appended to open issue #${issue.number}`)
              return
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production smoke failed — ${date}`,
              body: [
                '## Production smoke-test failed',
                '',
                `**Workflow run:** ${runUrl}`,
                '',
                'The scheduled production smoke run failed. This usually means one of:',
                '',
                '- Cloudflare config drift (caching, redirect rules, security shield)',
                '- cPanel/Apache state changed unexpectedly (`.htaccess`, `/hub/`, docroot)',
                '- A third-party widget regressed (Zeffy/PayPal/GTM/Tawk endpoint)',
                '- A real broken URL in the sitemap',
                '',
                '## Next steps',
                '',
                '1. Open the workflow run above and read the smoke-test output',
                '2. Reproduce locally if needed: `BASE_URL=https://freeforcharity.org npm run smoke-test`',
                '3. Fix the underlying issue (most likely operator-side: Cloudflare / cPanel dashboard)',
                '4. Re-run the workflow to confirm green; the issue auto-closes if you keep this label and resolve it',
                '',
                '_This issue was created automatically by `.github/workflows/scheduled-prod-smoke.yml`._',
              ].join('\n'),
              labels: ['production-health', 'incident'],
            })
            console.log('Created production-health issue')
