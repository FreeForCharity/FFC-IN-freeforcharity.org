name: Deploy to InterServer cPanel (production)

# Builds the static export and SFTP-uploads it to ~/public_html_next/
# on the InterServer cPanel host, alongside (not over) the WHMCS
# instance at ~/public_html/hub/.
#
# Manual-trigger only until the operator is comfortable with the
# deploy + swap workflow. Once stable, change the `on:` block to also
# fire on push to main.
#
# Required GitHub repository secrets (Settings → Secrets and variables
# → Actions):
#   FTP_SERVER     e.g. freeforcharity.org or ftp.freeforcharity.org
#   FTP_USERNAME   cPanel username (NOT root)
#   FTP_PASSWORD   cPanel FTP password
#   FTP_PORT       optional, defaults to 21 for FTPS
#
# The action used (SamKirkland/FTP-Deploy-Action) defaults to FTPS
# (encrypted FTP over TLS) which is what InterServer cPanel provides.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and SFTP upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js (production basePath — root)
        run: npm run build
        env:
          # Apex domain, no subpath
          NEXT_PUBLIC_BASE_PATH: ''
          # Analytics IDs are read at build time by cookie-consent.tsx —
          # baking them into the static export. If a secret is unset the
          # corresponding script never fires (no placeholder fallbacks),
          # which is the desired behaviour. See .env.example for full
          # documentation of these vars.
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_CLARITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_CLARITY_PROJECT_ID }}
          NEXT_PUBLIC_META_PIXEL_ID: ${{ secrets.NEXT_PUBLIC_META_PIXEL_ID }}

      - name: Verify build output
        run: |
          test -f out/index.html
          test -f out/.htaccess
          echo "out/ ready, $(find out -type f | wc -l) files"

      - name: Validate required secrets are configured
        run: |
          missing=0
          if [ -z "${{ secrets.FTP_SERVER }}" ];   then echo "::error::FTP_SERVER not set";   missing=1; fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then echo "::error::FTP_USERNAME not set"; missing=1; fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then echo "::error::FTP_PASSWORD not set"; missing=1; fi
          if [ "$missing" = "1" ]; then exit 1; fi

      - name: SFTP upload to ~/public_html_next/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || '21' }}
          protocol: ftps
          local-dir: ./out/
          server-dir: ./public_html_next/
          # Preserve the WHMCS billing instance — never touch /hub.
          # The exclude patterns apply BOTH to uploads and to remote
          # deletions, so anything matched here stays untouched on the
          # cPanel host even if it doesn't exist locally.
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/node_modules/**
            hub/**
            cgi-bin/**
            .htpasswd
            error_log
            .well-known/**

      - name: Post-deploy smoke check
        env:
          DEPLOY_URL: https://freeforcharity.org/
        run: |
          # Cloudflare proxy caches aggressively; bust with a header
          curl --fail --show-error --silent --location \
            --max-time 20 \
            -H "Cache-Control: no-cache" \
            -o /dev/null \
            -w "Smoke: %{http_code} on %{url_effective} in %{time_total}s\n" \
            "$DEPLOY_URL"
