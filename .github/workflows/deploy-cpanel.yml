name: Deploy to InterServer cPanel (production)

# Builds the Next.js static export and uploads it to ~/public_html_next/
# on the InterServer cPanel host, alongside (not over) the live docroot at
# ~/public_html/ and the WHMCS instance at ~/public_html/hub/.
#
# Credential model: GH OIDC -> Azure -> Key Vault (kv-ffc-admin-prod-cbm) ->
# production FTP creds -> lftp mirror -> ~/public_html_next/. This mirrors
# the proven deploy-cpanel-staging.yml pathway; there are NO raw FTP_*
# repository secrets anymore (the old SamKirkland/FTP-Deploy-Action model
# was retired in favour of KV-OIDC so no plaintext FTP password ever lives
# in GitHub).
#
# Upload vs. cutover are deliberately SEPARATE:
#   * This workflow only ever writes to ~/public_html_next/ -- a parking
#     directory that is NOT served at any URL until an operator swaps the
#     apex docroot to it in cPanel. So a dispatch with run_smoke=false has
#     zero live impact and is safe to run repeatedly.
#   * The full live-apex smoke suite (npm run smoke-test against
#     https://freeforcharity.org/) only makes sense AFTER the docroot swap.
#     It is therefore gated behind the run_smoke input (default false) so a
#     pre-cutover upload can go green without depending on the apex already
#     serving this build.
#
# === One-time prerequisites the operator must set up (admin-side) ===
#   1. GitHub Environment `cpanel-production` (Settings -> Environments).
#   2. Environment secrets on cpanel-production:
#        WR_ALL_FFC_AZURE_KV_CLIENT_ID
#        WR_ALL_FFC_AZURE_TENANT_ID
#      (same KV-writer Entra app used by cpanel-staging).
#   3. Azure federated credential on that Entra app for subject
#        repo:FreeForCharity/FFC-IN-freeforcharity.org:environment:cpanel-production
#      (case-sensitive -- must match exactly).
#   4. Key Vault `kv-ffc-admin-prod-cbm` must hold the PRODUCTION FTP creds:
#        wr-all-cbm-cpanel-ffc-interserver-ftp-host          (shared w/ staging)
#        wr-all-cbm-cpanel-ffc-interserver-ftp-port          (shared w/ staging)
#        wr-all-cbm-cpanel-ffc-interserver-deploy-prod-ftp-user
#        wr-all-cbm-cpanel-ffc-interserver-deploy-prod-ftp-password
#      The prod FTP user needs write access to ~/public_html_next/ (i.e. the
#      main cPanel account or a deploy user whose home is the account root --
#      NOT a subdomain-jailed user like deploy-staging).

on:
  workflow_dispatch:
    inputs:
      delete_remote:
        description: 'Remove remote files in public_html_next not in the local build (lftp --delete). True = clean mirror; False = additive upload.'
        required: false
        default: true
        type: boolean
      run_smoke:
        description: 'Run the full live-apex smoke suite after upload. Only set true AFTER the apex docroot has been cut over to public_html_next.'
        required: false
        default: false
        type: boolean
      public_url_base:
        description: 'Base URL for the post-cutover smoke suite (only used when run_smoke=true).'
        required: false
        default: 'https://freeforcharity.org'
        type: string

permissions:
  id-token: write # required for OIDC to Azure
  contents: read
  actions: read # required for the CI-green gate (gh run list)

concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build + deploy to ~/public_html_next/
    runs-on: ubuntu-latest
    environment: cpanel-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Safety gate: refuse to deploy if the CI workflow (lint, jest,
      # build, Playwright) on this exact commit isn't green. The deploy
      # workflow itself doesn't re-run the test suite, so without this
      # check an operator could ship a known-broken build.
      - name: Verify CI is green for this ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          REF: ${{ github.sha }}
        run: |
          set -e
          rows=$(gh run list \
            --workflow="CI - Build and Test" \
            --commit="$REF" \
            --limit 5 \
            --json status,conclusion,databaseId,createdAt)
          row_count=$(echo "$rows" | jq 'length')
          if [ "$row_count" = "0" ]; then
            echo "::error::No CI workflow run found for commit $REF."
            echo "::error::This usually means:"
            echo "::error::  - the commit was force-pushed after CI started (history rewritten)"
            echo "::error::  - the CI workflow file was disabled or renamed since this commit"
            echo "::error::  - the run was manually deleted"
            echo "::error::Re-trigger CI on this ref before deploying:"
            echo "::error::    gh workflow run 'CI - Build and Test' --ref $REF"
            exit 1
          fi
          # Pick the most recent run that actually decided an outcome --
          # skip cancelled/skipped runs (operator cancel, concurrency
          # group cancel, never-started skip) and fall through to an
          # earlier run that ran the full suite. Without this, a manual
          # cancel on the latest run would hide a previous green run and
          # block the deploy.
          status=$(echo "$rows" | jq '[.[] | select(.conclusion != "cancelled" and .conclusion != "skipped")][0] // .[0]')
          conclusion=$(echo "$status" | jq -r '.conclusion // "missing"')
          state=$(echo "$status" | jq -r '.status // "missing"')
          run_id=$(echo "$status" | jq -r '.databaseId // "?"')
          echo "CI workflow on $REF: state=$state conclusion=$conclusion run_id=$run_id"
          if [ "$state" != "completed" ]; then
            echo "::error::CI workflow on $REF is still $state (run $run_id). Wait for CI to complete before deploying."
            exit 1
          fi
          if [ "$conclusion" != "success" ]; then
            echo "::error::CI workflow on $REF concluded with '$conclusion' (run $run_id) -- refuse to deploy."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js (production basePath -- root)
        run: npm run build
        env:
          # Apex domain, no subpath -- same as deploy-cpanel-staging.yml.
          NEXT_PUBLIC_BASE_PATH: ''
          # Analytics IDs are read at build time by cookie-consent.tsx --
          # baking them into the static export. If a secret is unset the
          # corresponding script never fires (no placeholder fallbacks),
          # which is the desired behaviour. See .env.example for full
          # documentation of these vars.
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_CLARITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_CLARITY_PROJECT_ID }}
          NEXT_PUBLIC_META_PIXEL_ID: ${{ secrets.NEXT_PUBLIC_META_PIXEL_ID }}
          NEXT_PUBLIC_GTM_CONTAINER_ID: ${{ secrets.NEXT_PUBLIC_GTM_CONTAINER_ID }}
          NEXT_PUBLIC_TAWK_TO_PROPERTY: ${{ secrets.NEXT_PUBLIC_TAWK_TO_PROPERTY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${{ secrets.NEXT_PUBLIC_SENTRY_ENVIRONMENT }}

      - name: Verify build output
        run: |
          test -f out/index.html
          # Hard-fail without .htaccess: Apache needs it to route clean URLs
          # to *.html, and deploy-cpanel-staging.yml asserts the same. Without
          # it the upload would "succeed" but the site would be broken.
          test -f out/.htaccess
          echo "out/ ready, $(find out -type f | wc -l) files"

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.WR_ALL_FFC_AZURE_KV_CLIENT_ID }}
          tenant-id: ${{ secrets.WR_ALL_FFC_AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Fetch production FTP creds from Key Vault
        shell: pwsh
        env:
          # Hardcoded: this workflow targets exactly one vault. Not taking a
          # workflow_dispatch input for it narrows attack surface -- nobody
          # can re-point a dispatch at an unrelated KV name.
          KV_NAME: kv-ffc-admin-prod-cbm
        run: |
          $ErrorActionPreference = 'Stop'
          . ./.github/scripts/Get-KvSecret.ps1

          $vault = $env:KV_NAME.Trim()

          $ftpHost = Get-KvSecret -VaultName $vault -Name 'wr-all-cbm-cpanel-ffc-interserver-ftp-host'
          $ftpPort = Get-KvSecret -VaultName $vault -Name 'wr-all-cbm-cpanel-ffc-interserver-ftp-port'
          $ftpUser = Get-KvSecret -VaultName $vault -Name 'wr-all-cbm-cpanel-ffc-interserver-deploy-prod-ftp-user'
          $ftpPw   = Get-KvSecret -VaultName $vault -Name 'wr-all-cbm-cpanel-ffc-interserver-deploy-prod-ftp-password'

          # Mask everything that could fingerprint or authenticate. ftp-port
          # is left unmasked because it is a low-entropy small integer.
          Write-Host "::add-mask::$ftpHost"
          Write-Host "::add-mask::$ftpUser"
          Write-Host "::add-mask::$ftpPw"

          "CPANEL_FTP_HOST=$ftpHost"     | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CPANEL_FTP_PORT=$ftpPort"     | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CPANEL_FTP_USER=$ftpUser"     | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CPANEL_FTP_PASSWORD=$ftpPw"   | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload out/ to ~/public_html_next/
        env:
          DELETE_REMOTE: ${{ inputs.delete_remote }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          DELETE_FLAG=""
          if [ "$DELETE_REMOTE" = "true" ]; then
            DELETE_FLAG="--delete"
          fi

          # lftp mirror notes (identical pattern to deploy-cpanel-staging.yml):
          #   --reverse           upload (local -> remote) instead of download
          #   --delete            remove remote files not in local (gated by input)
          #   --parallel=4        4 concurrent transfers
          # We mirror ./out/ into ./public_html_next/ (relative to the FTP
          # user's home). hub/** (WHMCS) lives under ./public_html/, OUTSIDE
          # this target dir, so --delete can never reach it -- but cgi-bin,
          # .well-known, .htpasswd, error_log and .ftpquota are excluded as
          # defence-in-depth in case the server ever places them here.
          # NOTE: .htaccess is NOT excluded -- the Next.js out/.htaccess must
          # deploy or routing breaks (see "Verify build output" above).
          # Script is piped to lftp via stdin (heredoc) rather than `lftp -c
          # "..."` so the embedded password never lands in the process argv
          # (readable via /proc by any side-car). lftp is run without -d so
          # debug output can't leak transformed credentials past GH masking.
          lftp <<LFTP_SCRIPT 2>&1 | tail -200
            set ftp:ssl-allow no
            set net:max-retries 3
            set net:reconnect-interval-base 5
            set net:timeout 60
            open -p "$CPANEL_FTP_PORT" -u "$CPANEL_FTP_USER","$CPANEL_FTP_PASSWORD" "ftp://$CPANEL_FTP_HOST"
            mirror --reverse $DELETE_FLAG --parallel=4 --verbose=1 \
              --exclude-glob '.ftpquota' \
              --exclude-glob '.well-known' \
              --exclude-glob 'cgi-bin' \
              --exclude-glob '.htpasswd' \
              --exclude-glob 'error_log' \
              ./out/ ./public_html_next/
            bye
          LFTP_SCRIPT
          echo "Upload to ~/public_html_next/ complete."

      - name: Deploy summary
        env:
          DELETE_REMOTE: ${{ inputs.delete_remote }}
        run: |
          {
            echo "## Production upload to ~/public_html_next/"
            echo ""
            echo "- **Files uploaded:** $(find out -type f | wc -l)"
            echo "- **Clean mirror (--delete):** ${DELETE_REMOTE}"
            echo ""
            echo "This directory is NOT live yet. To cut over, swap the apex"
            echo "docroot to public_html_next in cPanel, then re-dispatch this"
            echo "workflow with run_smoke=true to verify the live apex."
          } >> "$GITHUB_STEP_SUMMARY"

      # Post-cutover only. Full smoke suite: every sitemap URL returns 200,
      # every WP->Next 301 from docs/cutover-redirects.csv fires to the right
      # target, /hub/ serves a WHMCS-marker body, an unknown URL returns 404,
      # and key assets (sitemap.xml, robots.txt, favicon) are reachable.
      - name: Full smoke suite (post-cutover)
        if: ${{ inputs.run_smoke }}
        env:
          BASE_URL: ${{ inputs.public_url_base }}
        run: |
          # Quick reachability first -- bust Cloudflare cache so we observe
          # the freshly-deployed origin, not an edge-cached old response.
          curl --fail --show-error --silent --location \
            --max-time 20 \
            -H "Cache-Control: no-cache" \
            -o /dev/null \
            -w "Home: %{http_code} on %{url_effective} in %{time_total}s\n" \
            "${BASE_URL%/}/"
          npm run smoke-test
